name: CI DevSecOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  test-and-security:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit pip-audit

      - name: Tests
        run: pytest -q

      - name: SAST Bandit
        run: bandit -r app --severity-level medium

      - name: SCA pip-audit
        run: pip-audit -r requirements.txt

      - name: Build Docker image
        run: docker build --pull -t tp-devsecops-pipeline:ci .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'tp-devsecops-pipeline:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
          exit-code: '1'
